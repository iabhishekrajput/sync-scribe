name: Publish Images

on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/sync-scribe-app
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/sync-scribe-service
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          annotations: ${{ steps.meta-web.outputs.annotations }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080' }}
            NEXT_PUBLIC_WS_BASE_URL=${{ vars.NEXT_PUBLIC_WS_BASE_URL || 'ws://localhost:8080' }}
            NEXT_PUBLIC_OIDC_PROVIDER_NAME=${{ vars.NEXT_PUBLIC_OIDC_PROVIDER_NAME || 'OIDC' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  publish-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract api image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          annotations: ${{ steps.meta-api.outputs.annotations }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
