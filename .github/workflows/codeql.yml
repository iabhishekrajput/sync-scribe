name: CodeQL Advanced

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "45 9 * * 2"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build toolchain is only needed by the manual (Go) build. The
      # build-mode: none languages (actions, javascript-typescript) extract
      # source directly, so skip setup for them — running setup-node with
      # `cache: pnpm` there left an empty store and failed the post-job
      # cache-save step.
      - name: Setup pnpm
        if: matrix.build-mode == 'manual'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: matrix.build-mode == 'manual'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Go
        if: matrix.build-mode == 'manual'
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          cd apps/api
          go mod tidy
          go build -v ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
