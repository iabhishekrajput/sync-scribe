name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web standalone bundle
        run: pnpm --filter web build

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist/web/apps/web/.next dist/bin

          cp -R apps/web/.next/standalone/. dist/web/
          cp -R apps/web/.next/static dist/web/apps/web/.next/static
          tar -czf "dist/syncscribe-web_${TAG}.tar.gz" -C dist/web .

          pushd apps/api >/dev/null
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../../dist/bin/syncscribe-api ./cmd/api
          popd >/dev/null

          tar -czf "dist/syncscribe-api_${TAG}_linux_amd64.tar.gz" -C dist/bin syncscribe-api

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/syncscribe-web_${{ github.ref_name }}.tar.gz
            dist/syncscribe-api_${{ github.ref_name }}_linux_amd64.tar.gz
